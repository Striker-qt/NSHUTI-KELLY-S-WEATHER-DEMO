<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - NSHUTI KELLY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather App</h1>
            <p>Search for current weather in any city!</p>
        </header>
        
        <main>
            <section class="search-section">
                <input type="text" id="cityInput" placeholder="Enter city name e.g. London" autocomplete="off">
                <button id="searchBtn">Search Weather</button>
                <button id="geoBtn" title="Use my location">📍 My Location</button>
            </section>
            
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Loading weather...</p>
            </div>
            
            <div id="error" class="error hidden">
                <p>❌ Location not found or error. Try again!</p>
            </div>
            
            <section id="weatherDisplay" class="weather-display hidden">
                <div class="location">
                    <h2 id="cityName"></h2>
                    <p id="time"></p>
                </div>
                <div class="current-weather">
                    <div class="temp">
                        <span id="tempValue"></span>
                        <span>°C</span>
                    </div>
                    <div class="condition">
                        <span id="conditionIcon"></span>
                        <span id="conditionText"></span>
                    </div>
                </div>
                <div class="details">
                    <div class="detail-item">
                        <span>Feels like</span>
                        <span id="feelsLike"></span>
                    </div>
                    <div class="detail-item">
                        <span>Humidity</span>
                        <span id="humidity"></span>
                    </div>
                    <div class="detail-item">
                        <span>Wind</span>
                        <span id="wind"></span>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
